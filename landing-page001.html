<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Minha Loja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a1a;
    overflow: hidden;
  }

  /* Orbs animados no fundo */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #6c3dd8; top: -150px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #c0392b; bottom: -100px; right: -80px; animation-delay: -3s; }
  .orb-3 { width: 300px; height: 300px; background: #1a6fb5; bottom: 100px; left: 150px; animation-delay: -5s; }
  .orb-4 { width: 250px; height: 250px; background: #9b2db8; top: 200px; right: 200px; animation-delay: -2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* Partículas */
  .particles { position: fixed; inset: 0; z-index: 0; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-20px) translateX(40px); opacity: 0; }
  }

  /* Card principal */
  .card-wrapper {
    position: relative;
    z-index: 10;
    perspective: 1000px;
  }

  .card {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 28px;
    padding: 48px 44px 44px;
    width: 400px;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.2),
      0 0 80px rgba(108, 61, 216, 0.15);
    animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    transition: transform 0.1s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Avatar */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    animation: fadeIn 0.6s 0.2s both;
  }
  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(108, 61, 216, 0.4);
  }
  .avatar::before {
    content: '';
    position: absolute;
    inset: -50%;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(108,61,216,0.6) 90deg, transparent 180deg);
    animation: spin 3s linear infinite;
  }
  .avatar-inner {
    position: relative;
    z-index: 1;
    width: 74px; height: 74px;
    border-radius: 50%;
    background: rgba(20, 12, 40, 0.85);
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-inner svg { width: 36px; height: 36px; fill: rgba(255,255,255,0.6); }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Títulos */
  .title {
    text-align: center;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
    animation: fadeIn 0.6s 0.3s both;
  }
  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    margin-bottom: 32px;
    animation: fadeIn 0.6s 0.35s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Campos */
  .field {
    position: relative;
    margin-bottom: 18px;
    animation: fadeIn 0.6s both;
  }
  .field:nth-child(1) { animation-delay: 0.4s; }
  .field:nth-child(2) { animation-delay: 0.5s; }

  .field-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    transition: color 0.3s;
    display: flex;
  }
  .field-icon svg { width: 18px; height: 18px; }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px 44px 14px 48px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    -webkit-appearance: none;
  }
  input::placeholder { color: rgba(255,255,255,0.3); }

  input:focus {
    background: rgba(255,255,255,0.1);
    border-color: rgba(108, 61, 216, 0.7);
    box-shadow: 0 0 0 3px rgba(108, 61, 216, 0.2), 0 0 20px rgba(108, 61, 216, 0.1);
  }
  input:focus + .field-label,
  input:not(:placeholder-shown) + .field-label {
    top: -8px;
    font-size: 11px;
    color: rgba(108, 61, 216, 1);
    background: rgba(20, 12, 40, 0.9);
    padding: 0 6px;
    border-radius: 4px;
  }

  .field:focus-within .field-icon { color: rgba(108, 61, 216, 0.9); }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.3);
    padding: 4px;
    display: flex;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: rgba(255,255,255,0.7); }
  .eye-btn svg { width: 18px; height: 18px; }

  /* Linha de opções */
  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0 24px;
    animation: fadeIn 0.6s 0.55s both;
  }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    user-select: none;
  }
  .remember input { display: none; }
  .check-box {
    width: 16px; height: 16px;
    border-radius: 5px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .remember input:checked ~ .check-box {
    background: #6c3dd8;
    border-color: #6c3dd8;
  }
  .remember input:checked ~ .check-box::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }
  .forgot {
    color: rgba(108, 61, 216, 0.85);
    font-size: 13px;
    text-decoration: none;
    transition: color 0.2s;
  }
  .forgot:hover { color: #9b70f5; }

  /* Botão login */
  .btn-login {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #6c3dd8 0%, #4c1d95 100%);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(108, 61, 216, 0.45);
    animation: fadeIn 0.6s 0.6s both;
  }
  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108, 61, 216, 0.6); }
  .btn-login:hover::before { opacity: 1; }
  .btn-login:active { transform: translateY(0) scale(0.99); }

  .btn-login .btn-text { position: relative; z-index: 1; }
  .btn-login .btn-loader {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
  }
  .btn-login.loading .btn-text { opacity: 0; }
  .btn-login.loading .btn-loader { display: flex; }

  .loader-ring {
    width: 22px; height: 22px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: rgba(255,255,255,0.25);
    font-size: 13px;
    animation: fadeIn 0.6s 0.65s both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  /* Social */
  .socials {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.6s 0.7s both;
  }
  .btn-social {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.25s;
  }
  .btn-social:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: #fff; transform: translateY(-1px); }
  .btn-social svg { width: 18px; height: 18px; }

  /* Footer */
  .register-link {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    animation: fadeIn 0.6s 0.75s both;
  }
  .register-link a {
    color: rgba(108, 61, 216, 0.9);
    text-decoration: none;
    font-weight: 600;
    margin-left: 4px;
    transition: color 0.2s;
  }
  .register-link a:hover { color: #9b70f5; }

  /* Shimmer no card */
  .card::after {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 30px;
    background: linear-gradient(135deg, rgba(108,61,216,0.3), transparent 50%, rgba(192,57,43,0.2));
    z-index: -1;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .card:hover::after { opacity: 1; }

  /* Toast de erro */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(192,57,43,0.9);
    backdrop-filter: blur(10px);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    border: 1px solid rgba(255,100,100,0.3);
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Success overlay */
  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(10, 10, 26, 0.85);
    backdrop-filter: blur(12px);
  }
  .success-overlay.show { display: flex; animation: fadeIn 0.3s both; }
  .success-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c3dd8, #4c1d95);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 0 40px rgba(108, 61, 216, 0.6);
    animation: pop 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .success-icon svg { width: 40px; height: 40px; stroke: #fff; fill: none; stroke-width: 2.5; }
  .success-text { color: #fff; font-size: 20px; font-weight: 600; }
  .success-sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 6px; }

  @keyframes pop {
    0% { transform: scale(0.3); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- Fundo animado -->
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="particles" id="particles"></div>

<!-- Toast -->
<div class="toast" id="toast">E-mail ou senha incorretos.</div>

<!-- Overlay de sucesso -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="success-text">Bem-vindo de volta!</div>
  <div class="success-sub">Redirecionando para sua conta…</div>
</div>

<!-- Card login -->
<div class="card-wrapper">
  <div class="card" id="loginCard">
    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar">
        <div class="avatar-inner">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
      </div>
    </div>

    <h1 class="title">Bem-vindo de volta</h1>
    <p class="subtitle">Entre para continuar comprando</p>

    <!-- Formulário -->
    <div>
      <!-- Email -->
      <div class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
        </span>
        <input type="email" id="emailInput" placeholder="seu@email.com" autocomplete="email">
      </div>

      <!-- Senha -->
      <div class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="passwordInput" placeholder="Sua senha" autocomplete="current-password">
        <button class="eye-btn" type="button" onclick="togglePassword()" id="eyeBtn" title="Mostrar senha">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Opções -->
      <div class="options">
        <label class="remember">
          <input type="checkbox" id="rememberMe">
          <span class="check-box"></span>
          Lembrar de mim
        </label>
        <a href="#" class="forgot">Esqueceu a senha?</a>
      </div>

      <!-- Botão login -->
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Entrar na conta</span>
        <span class="btn-loader"><div class="loader-ring"></div></span>
      </button>
    </div>

    <!-- Divisor -->
    <div class="divider">ou continue com</div>

    <!-- Social -->
    <div class="socials">
      <button class="btn-social">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="btn-social">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
      </button>
    </div>

    <p class="register-link">Não tem conta?<a href="#">Criar conta grátis</a></p>
  </div>
</div>

<script>
  // Partículas
  const pc = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      width: ${Math.random()*3+1}px;
      height: ${Math.random()*3+1}px;
      animation-duration: ${Math.random()*10+8}s;
      animation-delay: ${Math.random()*10}s;
      opacity: ${Math.random()*0.5+0.2};
    `;
    pc.appendChild(p);
  }

  // Efeito 3D no hover do card
  const card = document.getElementById('loginCard');
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    card.style.transform = `rotateY(${x * 6}deg) rotateX(${-y * 6}deg)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = '';
  });

  // Toggle senha
  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Login
  function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !email.includes('@')) { showToast('Informe um e-mail válido.'); return; }
    if (!password || password.length < 4) { showToast('Informe sua senha.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    // Simula autenticação
    setTimeout(() => {
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('successOverlay').classList.add('show');
      // Aqui você redirecionaria: window.location.href = '/dashboard';
    }, 1800);
  }

  // Enter para login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
